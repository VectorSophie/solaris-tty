name = "Jupiter Trojans (L4 / L5)"
description = "Sun, Jupiter, and asteroid swarms trapped 60° ahead (L4) and behind (L5) Jupiter. Press 'c' to switch to the co-rotating view — the Trojans freeze at the Lagrange points."

[simulation]
units = "si"
time_step = 3600.0
substeps = 240
integrator = "leapfrog"
gravitational_constant = 6.67430e-11
softening = 1.0e5

[render]
scale = "compressed"
trail_length = 1600
show_labels = true

[trace]
mode = "compact"
show_on_load = true

[[bodies]]
name = "Sun"
kind = "star"
mass = 1.98892e30
radius = 6.9634e8
distance = 0.0
orbital_velocity = 0.0
glyph = "*"
about = "G2V star"

[[bodies]]
