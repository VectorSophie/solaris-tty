name = "Realistic Solar System"
description = "Approximate Newtonian Solar System using real masses, distances, and velocities. Realistic in data, compressed in rendering. See docs/superpowers/specs for sources (NASA fact sheets + JPL satellite GM)."

[simulation]
units = "si"
# 300 s keeps even the tightest moons (Phobos, ~7.6 h period) well-resolved and
# stable. `substeps` here is the default steps-per-frame; the app tunes it live.
time_step = 300.0
substeps = 240
integrator = "leapfrog"
gravitational_constant = 6.67430e-11
softening = 1.0e3

[render]
scale = "compressed"
planet_size_mode = "exaggerated"
trail_length = 2000
show_orbits = true
show_labels = true

[trace]
mode = "compact"
show_on_load = true
show_on_spawn = true
show_on_collision = true
show_on_escape = true

# --- Star ---

[[bodies]]
name = "Sun"
kind = "star"
mass = 1.98892e30
radius = 6.9634e8
distance = 0.0
orbital_velocity = 0.0
glyph = "*"

