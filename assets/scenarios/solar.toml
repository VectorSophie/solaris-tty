name = "Realistic Solar System"
description = "Newtonian Solar System from real masses, radii, and J2000 orbital elements (a, e, i, Ω, ω, M). Realistic in data, compressed in rendering. Sources: NASA fact sheets, JPL satellite GM, JPL approximate planetary positions."

[simulation]
units = "si"
# 300 s keeps even the tightest moons (Phobos, ~7.6 h period) well-resolved and
# stable. `substeps` is the default steps-per-frame; the app tunes it live.
time_step = 300.0
substeps = 240
integrator = "leapfrog"
gravitational_constant = 6.67430e-11
softening = 1.0e3

# First-order post-Newtonian correction from the Sun's field. Makes Mercury's
# perihelion precess the textbook ~42.98″/century. Toggle live with `:set gr`.
[relativity]
enabled = true
model = "1pn_schwarzschild"
source = "Sun"
targets = ["Mercury", "Venus", "Earth", "Mars"]

[render]
scale = "compressed"
planet_size_mode = "exaggerated"
trail_length = 2000
show_orbits = true
show_labels = true

[trace]
mode = "compact"
show_on_load = true
show_on_spawn = true
show_on_collision = true
show_on_escape = true

